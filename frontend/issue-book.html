<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book | Library Management</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>📚 Library</h2>

        <ul>

            <li>
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="add-book.html">
                    <i class="fa-solid fa-book-medical"></i>
                    Add Book
                </a>
            </li>

            <li>
                <a href="books.html">
                    <i class="fa-solid fa-book"></i>
                    View Books
                </a>
            </li>

            <li>
                <a class="active" href="issue-book.html">
                    <i class="fa-solid fa-hand-holding"></i>
                    Issue Book
                </a>
            </li>

            <li>
                <a href="return-book.html">
                    <i class="fa-solid fa-rotate-left"></i>
                    Return Book
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-users"></i>
                    Members
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-chart-column"></i>
                    Reports
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-gear"></i>
                    Settings
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main">

        <div class="topbar">

            <div>
                <h1>Issue Book</h1>
                <p class="subtitle">Issue Books to Students</p>
            </div>

            <div class="profile">
                <i class="fa-solid fa-user"></i>
                Librarian
            </div>

        </div>

        <div class="form-card">

            <h2>Book Issue Details</h2>

            <form>

                <div class="form-row">

                    <div class="form-group">

                        <label>Student Name</label>

                        <input
                            type="text"
                            placeholder="Enter Student Name">

                    </div>

                    <div class="form-group">

                        <label>Student ID</label>

                        <input
                            type="text"
                            placeholder="Enter Student ID">

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>Book Name</label>

                        <input
                            type="text"
                            placeholder="Enter Book Name">

                    </div>

                    <div class="form-group">

                        <label>Book ID</label>

                        <input
                            type="text"
                            placeholder="Enter Book ID">

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>Issue Date</label>

                        <input type="date">

                    </div>

                    <div class="form-group">

                        <label>Return Date</label>

                        <input type="date">

                    </div>

                </div>
                                <div class="form-group">

                    <label>Book Condition</label>

                    <select>

                        <option>Select Condition</option>
                        <option>New</option>
                        <option>Good</option>
                        <option>Fair</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Remarks</label>

                    <textarea
                        rows="5"
                        placeholder="Enter Remarks (Optional)"></textarea>

                </div>

                <button class="btn" type="submit">

                    <i class="fa-solid fa-paper-plane"></i>

                    Issue Book

                </button>

            </form>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
